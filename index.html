<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para Você</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffafcc,#ffc8dd,#ffe5ec);
}

.container{
    text-align:center;
    z-index:10;
}

h1{
    color:#7a003c;
    font-size:3rem;
    margin-bottom:40px;
    text-shadow:2px 2px 10px rgba(255,255,255,.8);
    animation:pulse 2s infinite;
}

.buttons{
    display:flex;
    gap:50px;
    justify-content:flex-start;
}

button{
    border:none;
    padding:15px 35px;
    font-size:1.3rem;
    border-radius:50px;
    cursor:pointer;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

#sim{
    background:#ff4d8d;
    color:white;
     position:center;
}

#sim:hover{
    transform:scale(1.1);
}

#nao{
    background:white;
    color:#ff4d8d;
    position:absolute;
}

.heart{
    position:absolute;
    color:#ff4d8d;
    opacity:.8;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }

    to{
        transform:translateY(-120px);
    }
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.03);}
    100%{transform:scale(1);}
}

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    background:white;
    padding:35px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 40px rgba(255,105,180,.4);
    transition:.5s;
    z-index:100;
}

.popup.show{
    transform:translate(-50%,-50%) scale(1);
}

.popup h2{
    color:#ff4d8d;
    margin-bottom:10px;
}

.popup p{
    color:#7a003c;
    font-size:1.2rem;
}

</style>
</head>

<body>

<div class="container">
    <h1>Aceita viver uma vida inteira ao meu lado?</h1>

    <div class="buttons">
        <button id="sim">Sim</button>
        <button id="nao">Não</button>
    </div>
</div>

<div class="popup" id="popup">
    <h2>❤️</h2>
    <p>Encontro marcado no QPizza 19:30</p>
</div>

<script>

const nao = document.getElementById("nao");
const sim = document.getElementById("sim");
const popup = document.getElementById("popup");

nao.addEventListener("mouseover", () => {

    const maxX = window.innerWidth - nao.offsetWidth;
    const maxY = window.innerHeight - nao.offsetHeight;

    nao.style.left = Math.random()*maxX + "px";
    nao.style.top = Math.random()*maxY + "px";
});

sim.addEventListener("click", () => {

    popup.classList.add("show");

    for(let i=0;i<50;i++){

        const heart = document.createElement("div");

        heart.innerHTML = "❤️";
        heart.style.position = "fixed";
        heart.style.left = Math.random()*100 + "vw";
        heart.style.top = "100vh";
        heart.style.fontSize = (Math.random()*30+20)+"px";

        document.body.appendChild(heart);

        heart.animate([
            {transform:"translateY(0)", opacity:1},
            {transform:"translateY(-120vh)", opacity:0}
        ],{
            duration:4000,
            easing:"linear"
        });

        setTimeout(()=>{
            heart.remove();
        },4000);
    }

});

for(let i=0;i<25;i++){

    const heart = document.createElement("div");

    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100+"vw";
    heart.style.animation = `float ${Math.random()*8+6}s linear infinite`;
    heart.style.fontSize = (Math.random()*20+15)+"px";

    document.body.appendChild(heart);
}

</script>

</body>
</html>
